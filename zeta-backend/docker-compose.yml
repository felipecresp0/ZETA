# docker-compose.yml — Solo para desarrollo local
# En producción: PostgreSQL en AWS RDS, MongoDB en Atlas
version: '3.8'

services:
  # ── PostgreSQL (datos relacionales) ──
  postgres:
    image: postgres:16-alpine
    container_name: zeta_postgres
    environment:
      POSTGRES_DB: zeta_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zeta_dev_2025
    ports:
      - '5433:5432'
    volumes:
      - zeta_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zeta_admin -d zeta_db']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MongoDB (mensajería y tiempo real) ──
  mongo:
    image: mongo:7
    container_name: zeta_mongo
    ports:
      - '27017:27017'
    volumes:
      - zeta_mongo_data:/data/db

  # ── pgAdmin (opcional — GUI para PostgreSQL) ──
  pgadmin:
    image: dpage/pgadmin4
    container_name: zeta_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zeta.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  zeta_pg_data:
  zeta_mongo_data: